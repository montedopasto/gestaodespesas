<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link rel="stylesheet" href="../css/styles.css">
<link rel="stylesheet" href="https://unpkg.com/lucide@latest/dist/umd/lucide.css">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

<div class="app">

<header class="topbar">

<div class="logo-area">

<img src="../assets/logo-monte-do-pasto.png" class="logo">

<div class="titulo-app">
Gestão de Despesas
</div>

</div>

<div class="topbar-direita">
<div id="dataHora"></div>
<div id="utilizador"></div>
</div>

</header>

<div class="main">

<aside class="sidebar">

<button class="nav-btn nav-active" onclick="window.location.href='dashboard.html'">
<i data-lucide="layout-dashboard"></i>
<span>Dashboard</span>
</button>

<button class="nav-btn" onclick="window.location.href='nova-despesa.html'">
<i data-lucide="receipt"></i>
<span>Nova Nota de Despesa</span>
</button>

<button class="nav-btn" onclick="window.location.href='aprovacoes-despesas.html'">
<i data-lucide="check-circle"></i>
<span>Aprovações</span>
</button>

<button class="nav-btn" id="menuAdmin">
<i data-lucide="settings"></i>
<span>Administração</span>
</button>

</aside>

<section class="content">

<h2>Dashboard</h2>

<div class="cards">

<div class="card">
<div class="card-icon">
<i data-lucide="user-check"></i>
</div>
<h3>Para aprovar por mim</h3>
<p id="meusPendentes">0</p>
</div>

<div class="card">
<div class="card-icon">
<i data-lucide="file-text"></i>
</div>
<h3>Total</h3>
<p id="totalPedidos">0</p>
</div>

<div class="card">
<div class="card-icon">
<i data-lucide="clock"></i>
</div>
<h3>Pendentes</h3>
<p id="pendentes">0</p>
</div>

<div class="card">
<div class="card-icon">
<i data-lucide="check-circle"></i>
</div>
<h3>Aprovados</h3>
<p id="aprovados">0</p>
</div>

<div class="card">
<div class="card-icon">
<i data-lucide="x-circle"></i>
</div>
<h3>Rejeitados</h3>
<p id="rejeitados">0</p>
</div>

</div>

<br>

<!-- ================== FILTROS ================== -->

<div style="display:flex; gap:10px; margin-bottom:15px;">

    <input type="text" id="filtroPesquisa" placeholder="Pesquisar..." 
           style="padding:8px; border-radius:8px; border:1px solid #ccc; width:200px;">

    <select id="filtroEstado" style="padding:8px; border-radius:8px;">
        <option value="">Todos os estados</option>
        <option value="Pendente">Pendente</option>
        <option value="Aprovado">Aprovado</option>
        <option value="Rejeitado">Rejeitado</option>
    </select>

</div>

<!-- ================== TABELA ================== -->

<table>

<thead>
<tr>
    <th>Data</th>
    <th>Colaborador</th>
    <th>Total (€)</th>
    <th>Aprovador(es)</th>
    <th>Estado</th>
    <th></th>
</tr>
</thead>

<tbody id="tabelaDespesas">

</tbody>

</table>

</section>

</div>

</div>

<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>

<script src="../js/auth.js"></script>
<script src="../js/graph.js"></script>
<script src="../js/app.js"></script>
<script src="../js/despesas.js"></script>

<script>
window.addEventListener("load", () => {
    carregarDashboardDespesas();
});
</script>

<!-- 🔥 MODAL KM -->
<div id="modalKM" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:999;
backdrop-filter: blur(4px);
">

    <div style="
    background:white;
    width:85%;
    max-width:900px;
    margin:40px auto;
    padding:24px;
    border-radius:16px;
    max-height:85%;
    overflow:auto;
    box-shadow:0 20px 60px rgba(0,0,0,0.2);
    ">

        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 style="margin:0;">Detalhe da Despesa</h3>
            <button onclick="fecharModalKM()" style="border:none; background:none; font-size:20px; cursor:pointer;">✖</button>
        </div>

        <hr style="margin:15px 0;">

        <div id="zonaEstadoPedido" style="margin-bottom:20px; display:none;">
    <div id="carimboEstado" style="
        display:inline-block;
        padding:10px 18px;
        border-radius:10px;
        font-weight:800;
        font-size:18px;
        letter-spacing:0.5px;
        color:white;
    "></div>

    <div id="justificacaoRejeicao" style="
        margin-top:12px;
        padding:12px 14px;
        border-radius:10px;
        background:#fff4f4;
        border:1px solid #f1bcbc;
        color:#8a1f1f;
        display:none;
    ">
        <b>Justificação da rejeição:</b>
        <div id="textoJustificacaoRejeicao" style="margin-top:6px;"></div>
    </div>
</div>

<div id="conteudoKM"></div>
<div id="conteudoPDF" style="display:none;"></div>
<br>

<button onclick="downloadPDF()" style="
background:#1976d2;
color:white;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
margin-right:10px;
">
⬇ Download PDF
</button>

<button onclick="fecharModalKM()" style="
background:#2e7d32;
color:white;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
">
Fechar
</button>

    </div>

</div>
</body>
</html>
