<!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detalhe da Fatura</title>
<link rel="stylesheet" href="../css/styles.css">
</head>

<body>

<div class="app">

<header class="topbar">
  <div class="logo-area">
    <img src="../assets/logo-monte-do-pasto.png" class="logo">
    <div class="titulo-app">Aprovação de Faturas</div>
  </div>

  <div class="topbar-direita">
    <div id="dataHora"></div>
    <a href="dashboard.html" class="btn-voltar">← Voltar</a>
  </div>
</header>

<div class="main">

  <aside class="sidebar">

    <button class="nav-btn" onclick="window.location.href='dashboard.html'">
      Dashboard
    </button>

    <button class="nav-btn" onclick="window.location.href='aprovacoes.html'">
      Aprovações
    </button>

    <button class="nav-btn" onclick="window.location.href='pedidos.html'">
      Pedidos
    </button>

    <button class="nav-btn" id="btnNovaFatura">
      Nova Fatura
    </button>

    <button class="nav-btn" id="btnNovaDespesa">
      Nova Nota de Despesa
    </button>

    <button class="nav-btn" id="btnAdmin">
      Administração
    </button>

  </aside>

  <section class="content">

    <h2>Detalhe da Fatura</h2>

    <div class="pedido-layout">

      <!-- COLUNA ESQUERDA -->
      <div class="card detalhe-card">

        <div id="dadosPedido"></div>

        <div class="acoes-pedido">
          <button class="btn-aprovar" onclick="aprovarPedido()">Aprovar</button>
          <button class="btn-rejeitar" onclick="mostrarAreaRejeicao()">Rejeitar</button>
        </div>

        <div id="areaRejeicao" class="area-rejeicao">
          <textarea id="comentarioRejeicao" placeholder="Motivo da rejeição"></textarea>
          <button class="btn-confirmar-rejeicao" onclick="confirmarRejeicao()">
            Confirmar rejeição
          </button>
        </div>

      </div>


      <!-- COLUNA DIREITA -->
      <div class="card contexto-card">

        <h3>Histórico</h3>

        <div class="timeline">
          <ul id="timelinePedido"></ul>
        </div>

      </div>

    </div>

  </section>

</div>

</div>

<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/graph.js"></script>
<script src="../js/app.js"></script>

</body>
</html>
